name: Apply Learnings

# Runs automatically when learnings are pushed directly to main
on:
  push:
    branches: [main]
    paths:
      - 'learnings/**'

jobs:
  apply-learnings:
    runs-on: ubuntu-latest
    name: Record and index new learnings

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new learnings
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^learnings/' || true)
          if [ -n "$CHANGED" ]; then
            echo "has_learnings=true" >> $GITHUB_OUTPUT
            echo "New learnings detected:"
            echo "$CHANGED"
          else
            echo "has_learnings=false" >> $GITHUB_OUTPUT
          fi

      - name: Index learnings
        if: steps.detect.outputs.has_learnings == 'true'
        run: node scripts/ci-apply-learnings.js

      - name: Commit index update
        if: steps.detect.outputs.has_learnings == 'true'
        run: |
          git config user.name "lupio-learning-bot"
          git config user.email "bot@lupio-os"
          git add LEARNING_HISTORY.md
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "learn: update learning history index [skip ci]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
